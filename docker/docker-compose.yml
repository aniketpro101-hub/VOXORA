version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: voxora-mongodb
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-voxora_secure_password}
      MONGO_INITDB_DATABASE: voxora
    volumes:
      - mongo_data:/data/db
    networks:
      - voxora-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: voxora-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-voxora_redis_password}
    volumes:
      - redis_data:/data
    networks:
      - voxora-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-voxora_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atende/evolution-api:latest
    container_name: voxora-evolution-api
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-voxora_evolution_secret_key_2026}
      - LOG_LEVEL=ERROR,WARN,INFO
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/evolution?authSource=admin
      - DATABASE_CONNECTION_CLIENT_NAME=voxora_evo
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - evo_instances:/evolution/instances
    networks:
      - voxora-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  voxora-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: voxora-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=${NODE_ENV:-production}
      - MONGO_URI=${MONGO_URI:-mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/voxora?authSource=admin}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-voxora_redis_password}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-voxora_evolution_secret_key_2026}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - voxora-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started

  voxora-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: voxora-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    networks:
      - voxora-network
    depends_on:
      - voxora-backend

networks:
  voxora-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  evo_instances:
